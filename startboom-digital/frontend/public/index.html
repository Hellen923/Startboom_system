<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="CRM System" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/honeypot-icon.png" />
    <title>HoneyPot CRM</title>
    <!-- Dark mode flash prevention: apply saved theme BEFORE first paint -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('honeypot_theme');
          var theme = saved ? JSON.parse(saved) : {};
          if (theme.mode === 'dark') {
            document.documentElement.classList.add('dark');
            document.documentElement.setAttribute('data-theme', 'dark');
            document.documentElement.style.backgroundColor = '#0F1117';
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
